---
- name: Clone the ZoneMod (Competitive-Rework) source
  ansible.builtin.git:
    repo: https://github.com/SirPlease/L4D2-Competitive-Rework.git
    dest: /opt/l4d2-fleet/zonemod-src
    version: master
    depth: 1
    update: true

- name: Copy ZoneMod into the game directory
  ansible.builtin.copy:
    src: "/opt/l4d2-fleet/zonemod-src/{{ item }}"
    dest: "{{ install_dir }}/left4dead2/"
    remote_src: true
    owner: "{{ steam_user }}"
    group: "{{ steam_user }}"
  loop:
    - addons
    - cfg
    - scripts
    - host.txt
    - motd.txt
    - myhost.txt
    - mymotd.txt
