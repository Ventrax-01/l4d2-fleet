---
- name: Create the steam service account
  ansible.builtin.user:
    name: "{{ steam_user }}"
    shell: /bin/bash
    create_home: true

- name: Install SteamCMD and download L4D2 (app 222860)
  # The windows -> linux platform switch has to happen in one SteamCMD session,
  # otherwise app 222860 fails with "Invalid platform".
  ansible.builtin.shell: |
    set -e
    mkdir -p ~/steamcmd && cd ~/steamcmd
    if [ ! -f steamcmd.sh ]; then
      curl -sSL https://media.steampowered.com/installer/steamcmd_linux.tar.gz | tar xz
    fi
    ./steamcmd.sh +force_install_dir "{{ install_dir }}" +login anonymous \
      +@sSteamCmdForcePlatformType windows +app_update 222860 \
      +@sSteamCmdForcePlatformType linux +app_update 222860 validate +quit
  args:
    creates: "{{ install_dir }}/srcds_run"
  become: true
  become_user: "{{ steam_user }}"
